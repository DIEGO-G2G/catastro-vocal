  <script>
    const manifestData = {
      name: "Catastro Vocal",
      short_name: "Catastro",
      description: "Localizador catastral por reconocimiento de voz",
      start_url: "./",
      display: "standalone",
      background_color: "#060f1e",
      theme_color: "#060f1e",
      orientation: "portrait-primary",
      icons: [
        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%230b1d35'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle'%3E%F0%9F%8F%9B%EF%B8%8F%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%230b1d35'/%3E%3Ctext x='256' y='340' font-size='280' text-anchor='middle'%3E%F0%9F%8F%9B%EF%B8%8F%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
    const manifestURL = URL.createObjectURL(blob);
    document.addEventListener('DOMContentLoaded', () => {
      const link = document.createElement('link');
      link.rel = 'manifest'; link.href = manifestURL;
      document.head.appendChild(link);
    });
  </script>

  <style>

    .cv-install-bar { width:100%;max-width:560px;background:rgba(21,53,96,.5);border:1px solid rgba(59,130,246,.2);border-radius:12px;padding:.85rem 1.1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;animation:fadeUp .5s .2s cubic-bezier(.16,1,.3,1) both; }

    .cv-footer { margin-top:auto;padding-top:2rem;text-align:center;font-size:.62rem;letter-spacing:.1em;color:rgba(147,197,253,.25);text-transform:uppercase; }
    @keyframes ringPulse { 0%{transform:scale(1);opacity:1}100%{transform:scale(1.6);opacity:0} }
    @keyframes micPulse {

    @keyframes spin { to{transform:rotate(360deg)} }

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    /* ── Crypto helpers: encrypt/decrypt key with PIN ── */
    async function deriveKey(pin) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name:"PBKDF2", salt: enc.encode("catastro-salt-v1"), iterations:100000, hash:"SHA-256" },
        keyMaterial, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]
      );
    }
    async function encryptKey(apiKey, pin) {
      const enc = new TextEncoder();
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(pin);
      const ct  = await crypto.subtle.encrypt({ name:"AES-GCM", iv }, key, enc.encode(apiKey));
      const buf = new Uint8Array(iv.length + ct.byteLength);
      buf.set(iv, 0); buf.set(new Uint8Array(ct), iv.length);
      return btoa(String.fromCharCode(...buf));
    }
    async function decryptKey(stored, pin) {
      try {
        const buf = Uint8Array.from(atob(stored), c => c.charCodeAt(0));
        const iv  = buf.slice(0,12);
        const ct  = buf.slice(12);
        const key = await deriveKey(pin);
        const pt  = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
        return new TextDecoder().decode(pt);
      } catch { return null; }
    }

    function CatastroApp() {
      /* ── Auth state ── */
      const [authPhase, setAuthPhase] = useState("checking"); // checking|setup-key|setup-pin|locked|unlocked
      const [keyInput,  setKeyInput]  = useState("");
      const [pin1,      setPin1]      = useState(["","","",""]);
      const [pin2,      setPin2]      = useState(["","","",""]);
      const [pinEntry,  setPinEntry]  = useState(["","","",""]);
      const [pinError,  setPinError]  = useState("");
      const [unlockKey, setUnlockKey] = useState("");

      /* ── App state ── */
      const [isListening,     setIsListening]     = useState(false);
      const [transcript,      setTranscript]       = useState("");
      const [interim,         setInterim]          = useState("");
      const [phase,           setPhase]            = useState("idle");
      const [result,          setResult]           = useState(null);
      const [errorMsg,        setErrorMsg]         = useState("");
      const [speechAvail,     setSpeechAvail]      = useState(true);
      const [manualText,      setManualText]       = useState("");
      const [processingLabel, setProcessingLabel]  = useState("Analizando");
      const [installPrompt,   setInstallPrompt]    = useState(null);
      const [showInstall,     setShowInstall]      = useState(false);

      const recRef        = useRef(null);
      const listenRef     = useRef(false);
      const transcriptAcc = useRef("");
      const pin1Refs      = [useRef(),useRef(),useRef(),useRef()];
      const pin2Refs      = [useRef(),useRef(),useRef(),useRef()];
      const pinEntryRefs  = [useRef(),useRef(),useRef(),useRef()];

      /* ── Check if already configured ── */
      useEffect(() => {
        const stored = localStorage.getItem("cv_enc");
        setAuthPhase(stored ? "locked" : "setup-key");
      }, []);

      /* ── PWA install ── */
      useEffect(() => {
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault(); setInstallPrompt(e); setShowInstall(true);
        });
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        if (isIOS && !window.matchMedia('(display-mode:standalone)').matches) setShowInstall(true);
      }, []);

      /* ── Speech Recognition ── */
      const sessionBaseRef = useRef(""); // text accumulated before current rec session

      useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setSpeechAvail(false); return; }
        const rec = new SR();
        rec.lang="es-ES";
        rec.continuous = false;      // NON-continuous: more reliable on mobile
        rec.interimResults = true;
        rec.maxAlternatives = 1;

        rec.onresult = (e) => {
          let finals = "";
          let interim = "";
          for (let i = 0; i < e.results.length; i++) {
            if (e.results[i].isFinal) finals += e.results[i][0].transcript + " ";
            else interim += e.results[i][0].transcript;
          }
          // Full transcript = what we had before this session + new finals + interim
          const full = sessionBaseRef.current + finals;
          if (finals) transcriptAcc.current = full;
          setTranscript(full || sessionBaseRef.current);
          setManualText((full || sessionBaseRef.current).trim());
          setInterim(interim);
        };

        rec.onend = () => {
          if (listenRef.current) {
            // Save accumulated text so next session starts fresh without duplication
            sessionBaseRef.current = transcriptAcc.current;
            setTimeout(() => {
              if (listenRef.current) try { rec.start(); } catch(_) {}
            }, 200);
          }
        };

        rec.onerror = (e) => {
          if (e.error === "no-speech" || e.error === "aborted") return;
        };
        recRef.current = rec;
      }, []);

      /* ── PIN input helpers ── */
      const handlePinInput = (refs, arr, setArr, idx, val) => {
        /* Mobile may paste multiple digits at once */
        const digits = val.replace(/\D/g,"");
        if (!digits && val !== "") return;
        if (digits.length > 1) {
          /* Handle paste of full PIN */
          const next = [...arr];
          for(let j=0;j<4&&j<digits.length;j++) next[j]=digits[j];
          setArr(next);
          const last = Math.min(digits.length-1, 3);
          refs[last].current?.focus();
          return;
        }
        const next=[...arr]; next[idx]=digits; setArr(next);
        if (digits && idx<3) setTimeout(()=>refs[idx+1].current?.focus(), 10);
      };
      const handlePinKey = (refs, arr, setArr, idx, e) => {
        if (e.key==="Backspace"&&!arr[idx]&&idx>0) refs[idx-1].current?.focus();
      };

      /* ── Setup: save key+PIN ── */
      const handleSaveSetup = async () => {
        const p1 = pin1.join(""); const p2 = pin2.join("");
        if (!keyInput.trim().startsWith("sk-")) { setPinError("La clave debe empezar por sk-"); return; }
        if (p1.length!==4) { setPinError("El PIN debe tener 4 dígitos"); return; }
        if (p1!==p2) { setPinError("Los PIN no coinciden"); return; }
        const enc = await encryptKey(keyInput.trim(), p1);
        localStorage.setItem("cv_enc", enc);
        setUnlockKey(keyInput.trim());
        setAuthPhase("unlocked");
      };

      /* ── Unlock with PIN ── */
      const handleUnlock = async () => {
        const p = pinEntry.join("");
        if (p.length!==4) return;
        const stored = localStorage.getItem("cv_enc");
        const key = await decryptKey(stored, p);
        if (key) {
          setUnlockKey(key); setPinError(""); setAuthPhase("unlocked");
        } else {
          setPinError("PIN incorrecto"); setPinEntry(["","","",""]);
          pinEntryRefs[0].current?.focus();
        }
      };
      useEffect(() => {
        if (authPhase==="locked"&&pinEntry.join("").length===4) handleUnlock();
      }, [pinEntry, authPhase]);

      /* ── Reset config ── */
      const resetConfig = () => {
        localStorage.removeItem("cv_enc");
        setUnlockKey(""); setKeyInput(""); setPin1(["","","",""]); setPin2(["","","",""]);
        setPinEntry(["","","",""]); setPinError(""); setAuthPhase("setup-key");
      };

      /* ── Mic toggle ── */
      const toggleMic = () => {
        if (isListening) {
          listenRef.current=false;
          recRef.current?.stop();
          setIsListening(false);
          setInterim("");
          // Small delay to let final onresult fire before reading accumulator
          setTimeout(() => {
            const text = transcriptAcc.current.trim();
            if (text) {
              setManualText(text);
              processQuery(text);
            } else {
              setPhase("idle");
            }
          }, 400);
        } else {
          transcriptAcc.current=""; sessionBaseRef.current=""; setTranscript(""); setInterim(""); setResult(null); setErrorMsg("");
          setPhase("listening"); setIsListening(true); listenRef.current=true;
          try{recRef.current?.start();}catch(_){}
        }
      };

      const handleManual = () => {
        const t=manualText.trim(); if(!t) return;
        setTranscript(t); processQuery(t);
      };

      /* ── AI + Catastro query ── */
      const processQuery = async (text) => {
        setPhase("processing"); setProcessingLabel("Interpretando la localización");
        try {
          const resp = await fetch("https://api.openai.com/v1/chat/completions", {
            method:"POST",
            headers:{ "Content-Type":"application/json", "Authorization":`Bearer ${unlockKey}` },
            body: JSON.stringify({
              model:"gpt-4o-mini", max_tokens:400,
              messages:[
                { role:"system", content:"Eres un analizador de localizaciones españolas. Responde SOLO JSON válido, sin backticks ni texto adicional.\nDirección postal: {\"tipo\":\"direccion\",\"provincia\":\"PROV\",\"municipio\":\"MUN\",\"tipovia\":\"CL\",\"nomvia\":\"NOMBRE\",\"numero\":\"N\",\"piso\":\"\"}\nTipos de vía → CL=Calle, AV=Avenida, PL=Plaza, CM=Camino, PS=Paseo, CR=Carretera, GL=Glorieta, TR=Travesía, RD=Ronda\nCoordenadas WGS84: {\"tipo\":\"coordenadas\",\"lat\":40.0000,\"lon\":-3.0000}\nReferencia catastral (14-20 chars): {\"tipo\":\"refcat\",\"rc\":\"XXXXXXXX\"}\nNo reconocido: {\"tipo\":\"error\",\"msg\":\"desc\"}\nREGLAS: MAYÚSCULAS, sin acentos en campos de dirección, infiere provincia si no se menciona." },
                { role:"user", content:text }
              ]
            })
          });
          const data=await resp.json();
          const raw=data.choices?.[0]?.message?.content?.replace(/```json?\n?|```/g,"").trim();
          const parsed=JSON.parse(raw);
          if(parsed.tipo==="error"){ setErrorMsg(parsed.msg||"No se pudo interpretar la localización."); setPhase("error"); return; }
          setProcessingLabel("Consultando el Catastro");
          await queryCadastre(parsed);
        } catch(e) {
          setErrorMsg("Error al interpretar. Verifique su conexión."); setPhase("error");
        }
      };

      const queryCadastre = async (parsed) => {
        try {
          if (parsed.tipo === "refcat") {
            setResult({ rc: parsed.rc.trim(), ldt: "Referencia catastral directa", area: "", uso: "" });
            setPhase("result"); return;
          }
          let baseUrl;
          if (parsed.tipo === "coordenadas") {
            baseUrl = `https://ovc.catastro.meh.es/OVCServWeb/OVCWcfLocalizacionRC/COVCLocalizacionRC.svc/json/Consulta_RCCOOR?SRS=EPSG:4326&Latitud=${parsed.lat}&Longitud=${parsed.lon}`;
          } else {
            const enc = (v) => encodeURIComponent(v || "");
            baseUrl = `https://ovc.catastro.meh.es/OVCServWeb/OVCWcfCallejero/COVCCallejero.svc/json/Consulta_DNPPP?Provincia=${enc(parsed.provincia)}&Municipio=${enc(parsed.municipio)}&Sigla=${enc(parsed.tipovia || "CL")}&Calle=${enc(parsed.nomvia)}&Numero=${enc(parsed.numero)}&Piso=${enc(parsed.piso)}`;
          }

          /* Try three different CORS proxy approaches */
          const attempts = [
            () => fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(baseUrl)}`),
            () => fetch(`https://corsproxy.io/?${baseUrl}`),
            () => fetch(`https://thingproxy.freeboard.io/fetch/${baseUrl}`),
          ];

          let data = null;
          for (const attempt of attempts) {
            try {
              const r = await attempt();
              if (!r.ok) continue;
              const txt = await r.text();
              data = JSON.parse(txt);
              if (data) break;
            } catch(_) { continue; }
          }

          if (!data) throw new Error("Sin datos");

          let rc = "", ldt = "", area = "", uso = "";
          if (parsed.tipo === "coordenadas") {
            const c = data?.consulta_coordenadasResult?.coordenadas?.coord;
            if (c?.pc) { rc = (c.pc.pc1 || "") + (c.pc.pc2 || ""); ldt = c.ldt || ""; }
          } else {
            const res = data?.consulta_dnpppResult;
            let bi = res?.bico?.bi;
            if (Array.isArray(bi)) bi = bi[0];
            if (bi?.idbi?.rc?.pc1) {
              rc = (bi.idbi.rc.pc1 || "") + (bi.idbi.rc.pc2 || "");
              ldt = bi.dt?.ldt || "";
              area = bi.debi?.sfc ? `${bi.debi.sfc} m²` : "";
              uso = bi.debi?.luso || "";
            }
          }

          if (rc.trim().length >= 14) {
            setResult({ rc: rc.trim(), ldt, area, uso });
            setPhase("result");
          } else {
            throw new Error("Dirección no encontrada en el Catastro");
          }
        } catch(e) {
          setErrorMsg(`No se encontró la finca: ${e.message}. Compruebe que la dirección es correcta o pruebe con coordenadas.`);
          setPhase("error");
        }
      };

      const reset=()=>{ setPhase("idle");setTranscript("");setInterim("");setResult(null);setErrorMsg("");setManualText("");transcriptAcc.current=""; };

      const rc=result?.rc||"";
      const pdfUrl=`https://www1.sedecatastro.gob.es/CYCBienInmueble/OVCConCon.aspx?refcat=${rc}`;
      const geUrl=`https://www1.sedecatastro.gob.es/Cartografia/GeneraGoogleEarth.aspx?refcat=${rc}`;
      const fichaUrl=`https://www1.sedecatastro.gob.es/cycbieninmueble/ovcficha.aspx?refcat=${rc}`;
      const micClass=isListening?"listening":phase==="processing"?"processing":"idle";
      const statusText={idle:"Pulse el micrófono para comenzar",listening:"Escuchando — pulse de nuevo para detener",processing:processingLabel,result:"Finca catastral localizada",error:"No se pudo completar la búsqueda"}[phase]||"";
      const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);

      /* ════════ AUTH SCREENS ════════ */
      if(authPhase==="checking") return <div className="cv-root"><div className="cv-spinner" style={{marginTop:"3rem"}}/></div>;

      const PinDots = ({vals, refs, setArr, arr, label}) => (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:".75rem"}}>
          {label && <p style={{fontSize:".65rem",letterSpacing:".2em",color:"var(--gold)",textTransform:"uppercase",fontWeight:"500"}}>{label}</p>}
          <div style={{display:"flex",gap:"12px"}}>
            {[0,1,2,3].map(i=>(
              <input key={i} ref={refs[i]} type="tel" inputMode="numeric" pattern="[0-9]*" maxLength={1} value={vals[i]}
                onChange={e=>handlePinInput(refs,arr,setArr,i,e.target.value)}
                onKeyDown={e=>handlePinKey(refs,arr,setArr,i,e)}
                style={{width:"56px",height:"64px",textAlign:"center",fontSize:"1.8rem",fontWeight:"700",
                  background:"rgba(255,255,255,0.08)",
                  border:`2px solid ${vals[i]?"#3b82f6":"rgba(147,197,253,0.4)"}`,
                  boxShadow: vals[i]?"0 0 12px rgba(59,130,246,0.4)":"0 0 0 1px rgba(147,197,253,0.1)",
                  borderRadius:"14px",color:"white",outline:"none",caretColor:"var(--blue-300)",
                  fontFamily:"'DM Mono',monospace",transition:"all .15s",
                  WebkitAppearance:"none"}}/>
            ))}
          </div>
        </div>
      );

      if(authPhase==="setup-key"||authPhase==="setup-pin") return (
        <div className="cv-root">
          <header className="cv-header">
            <div className="cv-emblem"><div className="cv-emblem-ring"/><div className="cv-emblem-inner">🏛️</div></div>
            <p className="cv-eyebrow">Configuración inicial</p>
            <h1 className="cv-title">Catastro Vocal</h1>
            <div className="cv-divider"/>
          </header>

          <div style={{width:"100%",maxWidth:"420px",display:"flex",flexDirection:"column",gap:"1.25rem",animation:"fadeUp .5s cubic-bezier(.16,1,.3,1) both"}}>

            {/* Step indicator */}
            <div style={{display:"flex",alignItems:"center",gap:".5rem",justifyContent:"center",marginBottom:".25rem"}}>
              {["API Key","PIN de acceso"].map((s,i)=>(
                <React.Fragment key={i}>
                  <div style={{display:"flex",alignItems:"center",gap:".4rem"}}>
                    <div style={{width:"22px",height:"22px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".65rem",fontWeight:"700",
                      background:i===0?(authPhase==="setup-key"?"var(--blue-400)":"rgba(74,222,128,0.8)"):(authPhase==="setup-pin"?"var(--blue-400)":"rgba(255,255,255,0.1)"),
                      color:"white"}}>
                      {i===0&&authPhase==="setup-pin"?"✓":(i+1)}
                    </div>
                    <span style={{fontSize:".68rem",color:i===0?(authPhase==="setup-key"?"white":"rgba(74,222,128,.8)"):(authPhase==="setup-pin"?"white":"rgba(255,255,255,.3)"),fontWeight:"500"}}>{s}</span>
                  </div>
                  {i<1&&<div style={{width:"24px",height:"1px",background:"rgba(255,255,255,.15)"}}/>}
                </React.Fragment>
              ))}
            </div>

            <div style={{background:"rgba(15,39,72,0.75)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:"16px",padding:"1.75rem 1.5rem",backdropFilter:"blur(12px)"}}>

              {authPhase==="setup-key" && <>
                <p style={{fontSize:".7rem",color:"var(--muted)",lineHeight:"1.6",marginBottom:"1.25rem",fontWeight:"300"}}>
                  Solo necesitas hacer esto <strong style={{color:"white"}}>una única vez</strong>. Introduce tu clave de OpenAI y a partir de mañana solo necesitarás tu PIN de 4 dígitos.
                </p>
                <p style={{fontSize:".6rem",letterSpacing:".18em",color:"var(--gold)",textTransform:"uppercase",fontWeight:"500",marginBottom:".5rem"}}>Clave API de OpenAI</p>
                <input type="password" value={keyInput} onChange={e=>setKeyInput(e.target.value)}
                  placeholder="sk-proj-..."
                  style={{width:"100%",background:"var(--glass)",border:"1px solid rgba(255,255,255,.09)",borderRadius:"10px",padding:".75rem 1rem",color:"white",fontFamily:"'Outfit',sans-serif",fontSize:".85rem",outline:"none",marginBottom:"1.25rem"}}/>
                <button onClick={()=>{if(!keyInput.trim().startsWith("sk-")){setPinError("La clave debe empezar por sk-");return;}setPinError("");setAuthPhase("setup-pin");setTimeout(()=>pin1Refs[0].current?.focus(),100);}}
                  style={{width:"100%",background:"linear-gradient(135deg,var(--navy-500),var(--navy-600))",border:"1px solid rgba(59,130,246,.3)",borderRadius:"10px",padding:".8rem",color:"white",fontFamily:"'Outfit',sans-serif",fontSize:".85rem",fontWeight:"600",cursor:"pointer",letterSpacing:".06em"}}>
                  Siguiente →
                </button>
              </>}

              {authPhase==="setup-pin" && <>
                <p style={{fontSize:".7rem",color:"var(--muted)",lineHeight:"1.6",marginBottom:"1.5rem",fontWeight:"300",textAlign:"center"}}>
                  Elige un PIN de <strong style={{color:"white"}}>4 dígitos</strong>. Este será tu acceso diario a la aplicación.
                </p>
                <div style={{display:"flex",flexDirection:"column",gap:"1.5rem"}}>
                  <PinDots label="Tu PIN" vals={pin1} refs={pin1Refs} arr={pin1} setArr={setPin1}/>
                  <PinDots label="Confirmar PIN" vals={pin2} refs={pin2Refs} arr={pin2} setArr={setPin2}/>
                </div>
                <button onClick={handleSaveSetup}
                  style={{width:"100%",marginTop:"1.5rem",background:"linear-gradient(135deg,var(--navy-500),var(--navy-600))",border:"1px solid rgba(59,130,246,.3)",borderRadius:"10px",padding:".8rem",color:"white",fontFamily:"'Outfit',sans-serif",fontSize:".85rem",fontWeight:"600",cursor:"pointer",letterSpacing:".06em"}}>
                  Guardar y entrar ✓
                </button>
              </>}

              {pinError&&<p style={{fontSize:".75rem",color:"#f87171",marginTop:".75rem",textAlign:"center"}}>{pinError}</p>}
            </div>

            <p style={{fontSize:".62rem",color:"rgba(147,197,253,.3)",textAlign:"center",lineHeight:"1.5"}}>
              Tu clave se cifra con tu PIN y se guarda solo en este dispositivo.<br/>Nadie más puede acceder a ella.
            </p>
          </div>
        </div>
      );

      if(authPhase==="locked") return (
        <div className="cv-root">
          <header className="cv-header" style={{marginBottom:"2rem"}}>
            <div className="cv-emblem"><div className="cv-emblem-ring"/><div className="cv-emblem-inner">🏛️</div></div>
            <p className="cv-eyebrow">Sede Electrónica del Catastro</p>
            <h1 className="cv-title">Catastro Vocal</h1>
            <div className="cv-divider"/>
          </header>

          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"1.5rem",animation:"fadeUp .5s cubic-bezier(.16,1,.3,1) both"}}>
            <div style={{background:"rgba(15,39,72,0.75)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:"20px",padding:"2rem 2.5rem",backdropFilter:"blur(12px)",display:"flex",flexDirection:"column",alignItems:"center",gap:"1.25rem"}}>
              <div style={{fontSize:"2rem",opacity:.8}}>🔐</div>
              <p style={{fontSize:".65rem",letterSpacing:".2em",color:"var(--gold)",textTransform:"uppercase",fontWeight:"500"}}>Introduce tu PIN</p>
              <PinDots vals={pinEntry} refs={pinEntryRefs} arr={pinEntry} setArr={setPinEntry}/>
              {pinError&&<p style={{fontSize:".75rem",color:"#f87171"}}>{pinError}</p>}
              <p style={{fontSize:".65rem",color:"rgba(147,197,253,.35)",textAlign:"center"}}>4 dígitos para acceder</p>
              <button onClick={handleUnlock} style={{marginTop:".25rem",background:"linear-gradient(135deg,var(--navy-500),var(--navy-600))",border:"1px solid rgba(59,130,246,.3)",borderRadius:"10px",padding:".65rem 2rem",color:"white",fontFamily:"'Outfit',sans-serif",fontSize:".8rem",fontWeight:"600",cursor:"pointer",letterSpacing:".06em",width:"100%"}}>
                Entrar →
              </button>
            </div>
            <button onClick={resetConfig} style={{background:"transparent",border:"none",color:"rgba(147,197,253,.25)",fontSize:".62rem",cursor:"pointer",letterSpacing:".08em",textTransform:"uppercase",padding:".5rem"}}>
              ¿Olvidaste el PIN? Reconfigurar
            </button>
          </div>
        </div>
      );

      /* ════════ MAIN APP (unlocked) ════════ */
      return (
        <div className="cv-root">
          <header className="cv-header">
            <div className="cv-emblem"><div className="cv-emblem-ring"/><div className="cv-emblem-inner">🏛️</div></div>
            <p className="cv-eyebrow">Sede Electrónica del Catastro</p>
            <h1 className="cv-title">Catastro Vocal</h1>
            <p className="cv-subtitle">Localizador catastral por reconocimiento de voz</p>
            <div className="cv-divider"/>
          </header>

          {showInstall&&(
            <div className="cv-install-bar">
              <span style={{fontSize:"1.3rem"}}>📲</span>
              <p className="cv-install-text">{isIOS?"Instala como app: pulsa Compartir → «Añadir a pantalla de inicio»":"Instala esta app en tu dispositivo para acceso rápido"}</p>
              {!isIOS&&<button className="cv-install-btn" onClick={async()=>{if(installPrompt){await installPrompt.prompt();setShowInstall(false);}}}>Instalar</button>}
            </div>
          )}

          {!speechAvail&&<div className="cv-nospeech">⚠️ Su navegador no soporta reconocimiento de voz. Use Chrome o Edge, o introduzca la dirección manualmente.</div>}

          {(phase==="idle"||phase==="listening")&&(
            <div className="cv-mic-section">
              <div className="cv-mic-wrap">
                {isListening&&<><div className="cv-mic-ring cv-mic-ring-1"/><div className="cv-mic-ring cv-mic-ring-2"/><div className="cv-mic-ring cv-mic-ring-3"/></>}
                <button className={`cv-mic-btn ${micClass}`} onClick={speechAvail?toggleMic:undefined} disabled={!speechAvail}>
                  {isListening
                    ?<svg width="22" height="22" viewBox="0 0 24 24" fill="white"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                    :<svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M12 1C10.34 1 9 2.34 9 4v8c0 1.66 1.34 3 3 3s3-1.34 3-3V4c0-1.66-1.34-3-3-3z"/><path d="M19 10v2c0 3.87-3.13 7-7 7s-7-3.13-7-7v-2H3v2c0 4.07 2.93 7.44 6.79 7.93L9.8 20H7v2h10v-2h-2.8l.01-.07C18.07 19.44 21 16.07 21 12v-2h-2z"/></svg>}
                </button>
              </div>
              <p className={`cv-status ${phase}`}>{statusText}</p>
              {isListening&&<div className="cv-wave">{[1,2,3,4,5].map(i=><div key={i} className="cv-wave-bar" style={{animationDelay:`${i*0.08}s`}}/>)}</div>}
              {!isListening&&<p className="cv-hint">{speechAvail?"Diga la dirección, coordenadas o referencia catastral":"Introduzca la dirección en el campo de texto"}</p>}
            </div>
          )}

          {(transcript||interim||phase==="listening")&&phase!=="processing"&&phase!=="result"&&(
            <div className="cv-transcript-card">
              <p className="cv-transcript-label">Transcripción</p>
              {transcript||interim?<p className="cv-transcript-text">{transcript}{interim&&<span className="cv-transcript-interim"> {interim}</span>}</p>:<p className="cv-transcript-placeholder">Esperando que hable...</p>}
            </div>
          )}

          {(phase==="idle"||phase==="error")&&(
            <div className="cv-manual">
              <input className="cv-manual-input" type="text" value={manualText} onChange={e=>setManualText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleManual()} placeholder="Ej: Calle Mayor 5, Madrid · 40.4168,-3.7038"/>
              <button className="cv-manual-btn" onClick={handleManual}>🔍 Buscar</button>
            </div>
          )}

          {phase==="processing"&&<div className="cv-processing"><div className="cv-spinner"/><p className="cv-processing-text cv-dots">{processingLabel}</p></div>}

          {phase==="error"&&<div className="cv-error-card"><p className="cv-error-title">Error en la búsqueda</p><p className="cv-error-msg">{errorMsg}</p></div>}

          {phase==="result"&&result&&(
            <div className="cv-result">
              <div className="cv-result-header"><div className="cv-result-dot"/><p className="cv-result-title">Finca localizada</p></div>
              <div className="cv-result-card">
                <div className="cv-result-refcat-row"><p className="cv-result-refcat-label">Referencia Catastral</p><p className="cv-result-refcat-val">{result.rc}</p></div>
                {result.ldt&&<div className="cv-result-address-row"><p className="cv-result-address-label">Localización</p><p className="cv-result-address-val">{result.ldt}</p></div>}
                {(result.area||result.uso)&&<div className="cv-result-meta">
                  {result.area&&<div className="cv-meta-item"><p className="cv-meta-label">Superficie</p><p className="cv-meta-val">{result.area}</p></div>}
                  {result.uso&&<div className="cv-meta-item"><p className="cv-meta-label">Uso</p><p className="cv-meta-val">{result.uso}</p></div>}
                </div>}
              </div>
              <div className="cv-actions">
                <button className="cv-action-btn pdf" onClick={()=>window.open(pdfUrl,"_blank")}><span className="cv-action-icon">📄</span><span className="cv-action-label">Descargar PDF</span><span className="cv-action-sublabel">Ficha catastral</span></button>
                <button className="cv-action-btn ge" onClick={()=>window.open(geUrl,"_blank")}><span className="cv-action-icon">🌍</span><span className="cv-action-label">Google Earth</span><span className="cv-action-sublabel">Visor KMZ</span></button>
              </div>
              <div className="cv-actions-row">
                <button className="cv-action-btn ficha" onClick={()=>window.open(fichaUrl,"_blank")}><span className="cv-action-icon">🏛️</span><span className="cv-action-label">Abrir en Sede Catastral</span><span className="cv-action-sublabel">Ver ficha completa en la web oficial</span></button>
              </div>
            </div>
          )}

          {(phase==="result"||phase==="error")&&<button className="cv-reset-btn" onClick={reset}>↺ Nueva búsqueda</button>}

          <div style={{marginTop:"auto",paddingTop:"1.5rem",display:"flex",justifyContent:"center"}}>
            <button onClick={resetConfig} style={{background:"transparent",border:"none",color:"rgba(147,197,253,.18)",fontSize:".58rem",cursor:"pointer",letterSpacing:".08em",textTransform:"uppercase"}}>
              ⚙ Reconfigurar
            </button>
          </div>

          <footer className="cv-footer">Sede Electrónica del Catastro · Ministerio de Hacienda · España</footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(CatastroApp));

  </script>

  <!-- Service Worker para PWA offline -->
  <script>
    if ('serviceWorker' in navigator) {
      const sw = `
        const CACHE = 'catastro-v1';
        const ASSETS = ['./', './index.html'];
        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
        self.addEventListener('fetch', e => e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./')))
        ));
      `;
      const blob = new Blob([sw], {type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
  </script>
</body>
</html>
